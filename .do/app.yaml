# DigitalOcean App Platform — free static site.
#
# DO has no Flutter buildpack, so the GitHub Action (.github/workflows/
# deploy-web.yml) builds `flutter build web` and publishes the bundle to the
# `web-deploy` branch. This static site just serves that branch's files (no
# build step) and redeploys whenever the branch is pushed.
#
# Create with:  doctl apps create --spec .do/app.yaml
name: entropybrush
region: nyc
static_sites:
  - name: web
    github:
      repo: dnewcome/entropy-brush
      branch: web-deploy
      deploy_on_push: true
    source_dir: /
    # Single-page app: serve index.html for any unknown path.
    catchall_document: index.html
    index_document: index.html
domains:
  - domain: entropybrush.art
    type: PRIMARY
  - domain: www.entropybrush.art
    type: ALIAS

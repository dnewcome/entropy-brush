server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web is a single page; serve index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry point / bootstrap so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed assets (canvaskit, fonts, wasm) can cache hard.
    location ~* \.(?:js|wasm|ttf|otf|png|json|bin|data|symbols)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
